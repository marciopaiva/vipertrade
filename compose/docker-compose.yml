services:
  postgres:
    build:
      context: ..
      dockerfile: database/Dockerfile
    image: localhost/vipertrade-postgres:16-alpine
    container_name: vipertrade-postgres
    ports:
    - 5432:5432
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vipertrade}
      POSTGRES_USER: ${POSTGRES_USER:-viper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
    - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-viper} -d ${POSTGRES_DB:-vipertrade} -h 127.0.0.1
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
    - viper-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
  redis:
    image: docker.io/library/redis:7-alpine
    container_name: vipertrade-redis
    ports:
    - 6379:6379
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
    - redis_data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
    - viper-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
  market-data:
    container_name: vipertrade-market-data
    ports:
    - 8081:8081
    environment:
      VIPER_ROLE: market-data
      TRADING_MODE: ${TRADING_MODE:-paper}
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      STRATEGY_CONFIG: /app/config/trading/pairs.yaml
      REDIS_URL: redis://redis:6379
      ANALYTICS_SCORES_URL: ${ANALYTICS_SCORES_URL:-http://analytics:8086/scores}
      ANALYTICS_MIN_EVALUATED: ${ANALYTICS_MIN_EVALUATED:-20}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: vipertrade_market_data=${LOG_LEVEL:-info},tupa=warn
    depends_on:
      redis:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8081/health
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
    - viper-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    image: vipertrade:dev
    build:
      context: ..
      dockerfile: services/viper/Dockerfile
      args:
        TUPA_VERSION: ${TUPA_VERSION:-v0.10.0}
        BUILDER_IMAGE: ${RUST_BUILDER_IMAGE:-vipertrade-base-rust-builder:1.83}
        RUNTIME_IMAGE: ${STRATEGY_RUNTIME_IMAGE:-vipertrade-base-strategy-runtime:3.12-bookworm}
    command:
    - wait-for-deps.sh
    - redis:6379
    - --
    - viper
  analytics:
    container_name: vipertrade-analytics
    ports:
    - 8086:8086
    environment:
      VIPER_ROLE: analytics
      TRADING_MODE: ${TRADING_MODE:-paper}
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      STRATEGY_CONFIG: /app/config/trading/pairs.yaml
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      ANALYTICS_HORIZON_MINUTES: ${ANALYTICS_HORIZON_MINUTES:-5}
      ANALYTICS_LOOKBACK_HOURS: ${ANALYTICS_LOOKBACK_HOURS:-24}
      ANALYTICS_SAMPLE_INTERVAL_SECONDS: ${ANALYTICS_SAMPLE_INTERVAL_SECONDS:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8086/health
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
    - viper-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    image: vipertrade:dev
    command:
    - wait-for-deps.sh
    - postgres:5432
    - --
    - viper
  strategy:
    container_name: vipertrade-strategy
    ports:
    - 8082:8082
    environment:
      VIPER_ROLE: strategy
      TRADING_MODE: ${TRADING_MODE:-paper}
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      STRATEGY_CONFIG: /app/config/trading/pairs.yaml
      # Real decision logic (ENTER_LONG/SHORT) vs the always-HOLD stub. Safe in
      # paper: live orders are off, fills are DB-simulated.
      STRATEGY_REAL_DECISIONS: ${STRATEGY_REAL_DECISIONS:-true}
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: ${PYO3_USE_ABI3_FORWARD_COMPATIBILITY:-1}
      TUPA_AUDIT_PATH: /app/logs/audit
      REDIS_URL: redis://redis:6379
      TUPA_SEED: ${TUPA_SEED:-42}
      TUPA_BACKEND: ${TUPA_BACKEND:-hybrid}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      WALLET_API_BASE_URL: ${WALLET_API_BASE_URL:-http://api:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: ${RUST_LOG:-info}
      LD_LIBRARY_PATH: /usr/local/lib
    volumes:
    - logs_data:/app/logs
    - tupa-cache:/root/.cache/tupa
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
      market-data:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8082/health
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
    - viper-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    image: vipertrade:dev
    command:
    - wait-for-deps.sh
    - postgres:5432
    - redis:6379
    - market-data:8081
    - --
    - viper
  executor:
    container_name: vipertrade-executor
    ports:
    - 8083:8083
    environment:
      VIPER_ROLE: executor
      TRADING_MODE: ${TRADING_MODE:-paper}
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
      BYBIT_TESTNET_API_SECRET: ${BYBIT_TESTNET_API_SECRET:-}
      BYBIT_MAINNET_API_KEY: ${BYBIT_MAINNET_API_KEY:-}
      BYBIT_MAINNET_API_SECRET: ${BYBIT_MAINNET_API_SECRET:-}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_RECV_WINDOW: ${BYBIT_RECV_WINDOW:-5000}
      BYBIT_ACCOUNT_TYPE: ${BYBIT_ACCOUNT_TYPE:-UNIFIED}
      STRATEGY_CONFIG: /app/config/trading/pairs.yaml
      TRADING_PROFILE: ${TRADING_PROFILE:-MEDIUM}
      EXECUTOR_ENABLE_LIVE_ORDERS: ${EXECUTOR_ENABLE_LIVE_ORDERS:-false}
      EXECUTOR_PAPER_MAX_OPEN_POSITIONS: ${EXECUTOR_PAPER_MAX_OPEN_POSITIONS:-4}
      EXECUTOR_RECONCILE_FIX: ${EXECUTOR_RECONCILE_FIX:-false}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: vipertrade_executor=info,tupa=warn
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
      strategy:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8083/health
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
    - viper-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    image: vipertrade:dev
    command:
    - wait-for-deps.sh
    - postgres:5432
    - redis:6379
    - strategy:8082
    - --
    - viper
  monitor:
    container_name: vipertrade-monitor
    ports:
    - 8084:8084
    environment:
      VIPER_ROLE: monitor
      TRADING_MODE: ${TRADING_MODE:-paper}
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
      BYBIT_TESTNET_API_SECRET: ${BYBIT_TESTNET_API_SECRET:-}
      BYBIT_MAINNET_API_KEY: ${BYBIT_MAINNET_API_KEY:-}
      BYBIT_MAINNET_API_SECRET: ${BYBIT_MAINNET_API_SECRET:-}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_RECV_WINDOW: ${BYBIT_RECV_WINDOW:-5000}
      DISCORD_WEBHOOK_CRITICAL: ${DISCORD_WEBHOOK_CRITICAL}
      DISCORD_WEBHOOK_WARNING: ${DISCORD_WEBHOOK_WARNING}
      DISCORD_WEBHOOK_INFO: ${DISCORD_WEBHOOK_INFO}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      STRATEGY_CONFIG: /app/config/trading/pairs.yaml
      HEALTH_CHECK_INTERVAL_MIN: ${HEALTH_CHECK_INTERVAL_MIN:-15}
      RECONCILIATION_INTERVAL_MIN: ${RECONCILIATION_INTERVAL_MIN:-5}
      ALERT_COOLDOWN_SEC: ${ALERT_COOLDOWN_SEC:-300}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: vipertrade_monitor=info,tupa=warn
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8084/health
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
    - viper-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    image: vipertrade:dev
    command:
    - wait-for-deps.sh
    - postgres:5432
    - --
    - viper
  web:
    build:
      context: ..
      dockerfile: services/web/Dockerfile
      args:
        NODE_VERSION: '20'
        NEXT_PUBLIC_API_URL: http://localhost:8080
        NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
        NEXT_PUBLIC_TRADING_MODE: paper
    container_name: vipertrade-web
    ports:
    - 3000:3000
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
      DATABASE_URL: postgresql://${POSTGRES_USER:-viper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vipertrade}
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev_only_change_me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test:
      - CMD
      - wget
      - -q
      - -O
      - /dev/null
      - http://127.0.0.1:3000
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
      api:
        condition: service_healthy
        restart: true
      ai-analyst:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
    - viper-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
  api:
    container_name: vipertrade-api
    ports:
    - 8080:8080
    environment:
      VIPER_ROLE: api
      DATABASE_URL: postgresql://${POSTGRES_USER:-viper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vipertrade}
      REDIS_URL: redis://redis:6379
      TRADING_MODE: ${TRADING_MODE:-paper}
      STRATEGY_CONFIG: /app/config/trading/pairs.yaml
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
      BYBIT_TESTNET_API_SECRET: ${BYBIT_TESTNET_API_SECRET:-}
      BYBIT_MAINNET_API_KEY: ${BYBIT_MAINNET_API_KEY:-}
      BYBIT_MAINNET_API_SECRET: ${BYBIT_MAINNET_API_SECRET:-}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_RECV_WINDOW: ${BYBIT_RECV_WINDOW:-5000}
      BYBIT_ACCOUNT_TYPE: ${BYBIT_ACCOUNT_TYPE:-UNIFIED}
      JWT_SECRET: ${JWT_SECRET:-generate_me}
      TRADING_PROFILE: ${TRADING_PROFILE:-MEDIUM}
      OPERATOR_API_TOKEN: ${OPERATOR_API_TOKEN}
      OPERATOR_AUTH_MODE: ${OPERATOR_AUTH_MODE:-token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: vipertrade_api=info
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/health
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
    - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
    - viper-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    image: vipertrade:dev
    command:
    - wait-for-deps.sh
    - postgres:5432
    - redis:6379
    - --
    - viper
  ai-analyst:
    container_name: vipertrade-ai-analyst
    ports:
    - 8087:8087
    environment:
      VIPER_ROLE: ai-analyst
      DATABASE_URL: postgresql://${POSTGRES_USER:-viper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vipertrade}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      AI_ANALYST_LOOKBACK_HOURS: ${AI_ANALYST_LOOKBACK_HOURS:-24}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: viper_ai_analyst=info
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8087/health
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
    - viper-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    image: vipertrade:dev
    command:
    - wait-for-deps.sh
    - postgres:5432
    - --
    - viper
volumes:
  postgres_data: null
  redis_data: null
  logs_data: null
  tupa-cache: null
networks:
  viper-net:
    driver: bridge


services:
  # ═══════════════════════════════════════════════════════════
  # INFRASTRUCTURE SERVICES
  # ═══════════════════════════════════════════════════════════
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: vipertrade-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vipertrade}
      POSTGRES_USER: ${POSTGRES_USER:-viper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../database/init.sql:/docker-entrypoint-initdb.d/02-init.sql:ro
      - ../database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viper} -d ${POSTGRES_DB:-vipertrade} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
      - viper-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: vipertrade-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
      - viper-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ═══════════════════════════════════════════════════════════
  # CORE TRADING SERVICES
  # ═══════════════════════════════════════════════════════════
  market-data:
    build:
      context: ..
      dockerfile: services/market-data/Dockerfile
      args:
        RUST_VERSION: "1.83"
    container_name: vipertrade-market-data
    ports:
      - "8081:8081"
    environment:
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      BYBIT_WS_PUBLIC: ${BYBIT_WS_PUBLIC:-wss://stream-testnet.bybit.com/v5/public/linear}
      TRADING_PAIRS: ${TRADING_PAIRS:-DOGEUSDT,XRPUSDT,TRXUSDT,XLMUSDT}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_market_data=${LOG_LEVEL:-info},tupa=warn"
    volumes:
      - ../config/trading/pairs.yaml:/app/config/pairs.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
      - viper-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  strategy:
    build:
      context: ..
      dockerfile: services/strategy/Dockerfile
      args:
        TUPA_VERSION: "v0.8.0-rc.3"
        TUPA_BACKEND: ${TUPA_BACKEND:-hybrid}
        RUST_VERSION: "1.83"
    container_name: vipertrade-strategy
    ports:
      - "8082:8082"
    environment:
      STRATEGY_CONFIG: /app/config/trading/pairs.yaml
      PROFILE_CONFIG: /app/config/system/profiles.yaml
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: ${PYO3_USE_ABI3_FORWARD_COMPATIBILITY:-1}
      TUPA_PIPELINE_PATH: ${TUPA_PIPELINE_PATH:-/app/config/strategies/viper_smart_copy.tp}
      TUPA_AUDIT_PATH: /app/logs/audit
      REDIS_URL: redis://redis:6379
      TUPA_SEED: ${TUPA_SEED:-42}
      TUPA_BACKEND: ${TUPA_BACKEND:-hybrid}
      TRADING_PROFILE: ${TRADING_PROFILE:-MEDIUM}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: ${RUST_LOG:-info}
      LD_LIBRARY_PATH: /usr/local/lib
    volumes:
      - ../config:/app/config:ro
      - ../logs:/app/logs
      - tupa-cache:/root/.cache/tupa
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      market-data:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
      - viper-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  executor:
    build:
      context: ..
      dockerfile: services/executor/Dockerfile
      args:
        RUST_VERSION: "1.83"
    container_name: vipertrade-executor
    ports:
      - "8083:8083"
    environment:
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_WS_PRIVATE: ${BYBIT_WS_PRIVATE:-wss://stream-testnet.bybit.com/v5/private}
      BYBIT_RECV_WINDOW: ${BYBIT_RECV_WINDOW:-5000}
      BYBIT_ACCOUNT_TYPE: ${BYBIT_ACCOUNT_TYPE:-UNIFIED}
      EXECUTOR_ENABLE_LIVE_ORDERS: ${EXECUTOR_ENABLE_LIVE_ORDERS:-false}
      EXECUTOR_LIVE_SYMBOL_ALLOWLIST: ${EXECUTOR_LIVE_SYMBOL_ALLOWLIST:-DOGEUSDT}
      EXECUTOR_RECONCILE_FIX: ${EXECUTOR_RECONCILE_FIX:-false}
      TRADING_PAIRS: ${TRADING_PAIRS:-DOGEUSDT,XRPUSDT,TRXUSDT,XLMUSDT}
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_executor=info,tupa=warn"
    volumes:
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      strategy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
      - viper-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  monitor:
    build:
      context: ..
      dockerfile: services/monitor/Dockerfile
      args:
        RUST_VERSION: "1.83"
    container_name: vipertrade-monitor
    ports:
      - "8084:8084"
    environment:
      DISCORD_WEBHOOK_CRITICAL: ${DISCORD_WEBHOOK_CRITICAL}
      DISCORD_WEBHOOK_WARNING: ${DISCORD_WEBHOOK_WARNING}
      DISCORD_WEBHOOK_INFO: ${DISCORD_WEBHOOK_INFO}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      HEALTH_CHECK_INTERVAL_MIN: ${HEALTH_CHECK_INTERVAL_MIN:-15}
      RECONCILIATION_INTERVAL_MIN: ${RECONCILIATION_INTERVAL_MIN:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_monitor=info,tupa=warn"
    volumes:
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
      - viper-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  backtest:
    build:
      context: ..
      dockerfile: services/backtest/Dockerfile
      args:
        RUST_VERSION: "1.83"
    container_name: vipertrade-backtest
    ports:
      - "8085:8085"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
      - viper-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ═══════════════════════════════════════════════════════════
  # WEB & API SERVICES
  # ═══════════════════════════════════════════════════════════
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "20"
    container_name: vipertrade-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
      DATABASE_URL: postgresql://${POSTGRES_USER:-viper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vipertrade}
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev_only_change_me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ../web:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
      - viper-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
      args:
        RUST_VERSION: "1.83"
    container_name: vipertrade-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-viper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vipertrade}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-generate_me}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_api=info"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ../api:/app
      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    networks:
      - viper-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

# ═══════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════
volumes:
  postgres_data:
  redis_data:
  tupa-cache:

# ═══════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════
networks:
  viper-net:
    driver: bridge


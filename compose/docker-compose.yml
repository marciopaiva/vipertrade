version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════
  # INFRASTRUCTURE SERVICES
  # ═══════════════════════════════════════════════════════════
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: vipertrade-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vipertrade}
      POSTGRES_USER: ${POSTGRES_USER:-viper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../database/init.sql:/docker-entrypoint-initdb.d/02-init.sql:ro
      - ../database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    networks:
      - vipertrade-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viper} -d ${POSTGRES_DB:-vipertrade} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: vipertrade-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - vipertrade-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ═══════════════════════════════════════════════════════════
  # CORE TRADING SERVICES
  # ═══════════════════════════════════════════════════════════
  market-data:
    build:
      context: ..
      dockerfile: market-data/Dockerfile
      args:
        RUST_VERSION: "1.83"
    container_name: vipertrade-market-data
    environment:
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      BYBIT_WS_PUBLIC: ${BYBIT_WS_PUBLIC}
      TRADING_PAIRS: ${TRADING_PAIRS:-DOGEUSDT,XRPUSDT,TRXUSDT,XLMUSDT}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_market_data=${LOG_LEVEL:-info},tupa=warn"
    networks:
      - vipertrade-net
    volumes:
      - ../config/trading/pairs.yaml:/app/config/pairs.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  strategy:
    build:
      context: ..
      dockerfile: strategy/Dockerfile
      args:
        TUPA_VERSION: "v0.8.0-rc"
        TUPA_BACKEND: ${TUPA_BACKEND:-hybrid}
        RUST_VERSION: "1.83"
    container_name: vipertrade-strategy
    environment:
      STRATEGY_CONFIG: /app/config/trading/pairs.yaml
      TUPA_PIPELINE_PATH: ${TUPA_PIPELINE_PATH:-/app/config/strategies/viper_smart_copy.tp}
      TUPA_AUDIT_PATH: /app/logs/audit
      TUPA_SEED: ${TUPA_SEED:-42}
      TUPA_BACKEND: ${TUPA_BACKEND:-hybrid}
      TRADING_PROFILE: ${TRADING_PROFILE:-MEDIUM}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_strategy=info,tupa=warn"
    networks:
      - vipertrade-net
    volumes:
      - ../config:/app/config:ro
      - ../logs:/app/logs
      - tupa-cache:/root/.cache/tupa
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      market-data:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  executor:
    build:
      context: ..
      dockerfile: executor/Dockerfile
      args:
        RUST_VERSION: "1.83"
    container_name: vipertrade-executor
    environment:
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_WS_PRIVATE: ${BYBIT_WS_PRIVATE}
      TRADING_PAIRS: ${TRADING_PAIRS:-DOGEUSDT,XRPUSDT,TRXUSDT,XLMUSDT}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_executor=info,tupa=warn"
    networks:
      - vipertrade-net
    volumes:
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      strategy:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  monitor:
    build:
      context: ..
      dockerfile: monitor/Dockerfile
      args:
        RUST_VERSION: "1.83"
    container_name: vipertrade-monitor
    environment:
      DISCORD_WEBHOOK_CRITICAL: ${DISCORD_WEBHOOK_CRITICAL}
      DISCORD_WEBHOOK_WARNING: ${DISCORD_WEBHOOK_WARNING}
      DISCORD_WEBHOOK_INFO: ${DISCORD_WEBHOOK_INFO}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      HEALTH_CHECK_INTERVAL_MIN: ${HEALTH_CHECK_INTERVAL_MIN:-15}
      RECONCILIATION_INTERVAL_MIN: ${RECONCILIATION_INTERVAL_MIN:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_monitor=info,tupa=warn"
    networks:
      - vipertrade-net
    volumes:
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  backtest:
    build:
      context: ..
      dockerfile: backtest/Dockerfile
      args:
        RUST_VERSION: "1.83"
    container_name: vipertrade-backtest
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - vipertrade-net
    volumes:
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ═══════════════════════════════════════════════════════════
  # WEB & API SERVICES
  # ═══════════════════════════════════════════════════════════
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "20"
    container_name: vipertrade-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
      DATABASE_URL: postgresql://${POSTGRES_USER:-viper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vipertrade}
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - vipertrade-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ../web:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  api:
    build:
      context: ..
      dockerfile: api/Dockerfile
      args:
        RUST_VERSION: "1.83"
    container_name: vipertrade-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-viper}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-vipertrade}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-generate_me}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_api=info"
    networks:
      - vipertrade-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ../api:/app
      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

# ═══════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════
volumes:
  postgres_data:
  redis_data:
  tupa-cache:

# ═══════════════════════════════════════════════════════════
# NETWORKS
# ═══════════════════════════════════════════════════════════
networks:
  vipertrade-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16


services:
  # ═══════════════════════════════════════════════════════════
  # INFRASTRUCTURE SERVICES
  # ═══════════════════════════════════════════════════════════
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: vipertrade-postgres
    network_mode: host
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vipertrade}
      POSTGRES_USER: ${POSTGRES_USER:-viper}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../database/init.sql:/docker-entrypoint-initdb.d/02-init.sql:ro
      - ../database/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-viper} -d ${POSTGRES_DB:-vipertrade} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: vipertrade-redis
    network_mode: host
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ═══════════════════════════════════════════════════════════
  # CORE TRADING SERVICES
  # ═══════════════════════════════════════════════════════════
  market-data:
    build:
      context: ..
      dockerfile: services/market-data/Dockerfile
      args:
        RUST_VERSION: "1.83"
        RUST_BUILDER_IMAGE: ${RUST_BUILDER_IMAGE:-vipertrade-base-rust-builder:1.83}
        RUST_RUNTIME_IMAGE: ${RUST_RUNTIME_IMAGE:-vipertrade-base-rust-runtime:bookworm}
    container_name: vipertrade-market-data
    network_mode: host
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      BYBIT_WS_PUBLIC: ${BYBIT_WS_PUBLIC:-wss://stream-testnet.bybit.com/v5/public/linear}
      TRADING_PAIRS: ${TRADING_PAIRS:-DOGEUSDT,XRPUSDT,ADAUSDT,XLMUSDT}
      REDIS_HOST: localhost
      ANALYTICS_SCORES_URL: ${ANALYTICS_SCORES_URL:-http://localhost:8086/scores}
      ANALYTICS_MIN_EVALUATED: ${ANALYTICS_MIN_EVALUATED:-20}
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_market_data=${LOG_LEVEL:-info},tupa=warn"
    volumes:
      - ../config/trading/pairs.yaml:/app/config/pairs.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  analytics:
    build:
      context: ..
      dockerfile: services/analytics/Dockerfile
      args:
        RUST_VERSION: "1.83"
        RUST_BUILDER_IMAGE: ${RUST_BUILDER_IMAGE:-vipertrade-base-rust-builder:1.83}
        RUST_RUNTIME_IMAGE: ${RUST_RUNTIME_IMAGE:-vipertrade-base-rust-runtime:bookworm}
    container_name: vipertrade-analytics
    network_mode: host
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      TRADING_PAIRS: ${TRADING_PAIRS:-DOGEUSDT,XRPUSDT,ADAUSDT,XLMUSDT}
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      ANALYTICS_HORIZON_MINUTES: ${ANALYTICS_HORIZON_MINUTES:-5}
      ANALYTICS_LOOKBACK_HOURS: ${ANALYTICS_LOOKBACK_HOURS:-24}
      ANALYTICS_SAMPLE_INTERVAL_SECONDS: ${ANALYTICS_SAMPLE_INTERVAL_SECONDS:-5}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  strategy:
    build:
      context: ..
      dockerfile: services/strategy/Dockerfile
      args:
        TUPA_VERSION: "v0.8.0-rc.3"
        TUPA_BACKEND: ${TUPA_BACKEND:-hybrid}
        RUST_VERSION: "1.83"
        STRATEGY_BUILDER_IMAGE: ${STRATEGY_BUILDER_IMAGE:-vipertrade-base-strategy-builder:1.83}
        STRATEGY_RUNTIME_IMAGE: ${STRATEGY_RUNTIME_IMAGE:-vipertrade-base-strategy-runtime:3.12-bookworm}
    container_name: vipertrade-strategy
    network_mode: host
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      STRATEGY_CONFIG: /app/config/trading/pairs.yaml
      PROFILE_CONFIG: /app/config/system/profiles.yaml
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: ${PYO3_USE_ABI3_FORWARD_COMPATIBILITY:-1}
      TUPA_PIPELINE_PATH: ${TUPA_PIPELINE_PATH:-/app/config/strategies/viper_smart_copy.tp}
      TUPA_AUDIT_PATH: /app/logs/audit
      REDIS_URL: redis://localhost:6379
      TUPA_SEED: ${TUPA_SEED:-42}
      TUPA_BACKEND: ${TUPA_BACKEND:-hybrid}
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      WALLET_API_BASE_URL: ${WALLET_API_BASE_URL:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: ${RUST_LOG:-info}
      LD_LIBRARY_PATH: /usr/local/lib
    volumes:
      - ../config:/app/config:ro
      - ../logs:/app/logs
      - tupa-cache:/root/.cache/tupa
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      market-data:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  executor:
    build:
      context: ..
      dockerfile: services/executor/Dockerfile
      args:
        RUST_VERSION: "1.83"
        RUST_BUILDER_IMAGE: ${RUST_BUILDER_IMAGE:-vipertrade-base-rust-builder:1.83}
        RUST_RUNTIME_IMAGE: ${RUST_RUNTIME_IMAGE:-vipertrade-base-rust-runtime:bookworm}
    container_name: vipertrade-executor
    network_mode: host
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
      BYBIT_TESTNET_API_SECRET: ${BYBIT_TESTNET_API_SECRET:-}
      BYBIT_MAINNET_API_KEY: ${BYBIT_MAINNET_API_KEY:-}
      BYBIT_MAINNET_API_SECRET: ${BYBIT_MAINNET_API_SECRET:-}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_WS_PRIVATE: ${BYBIT_WS_PRIVATE:-wss://stream-testnet.bybit.com/v5/private}
      BYBIT_RECV_WINDOW: ${BYBIT_RECV_WINDOW:-5000}
      BYBIT_ACCOUNT_TYPE: ${BYBIT_ACCOUNT_TYPE:-UNIFIED}
      STRATEGY_CONFIG: /app/config/trading/pairs.yaml
      TRADING_PROFILE: ${TRADING_PROFILE:-MEDIUM}
      EXECUTOR_ENABLE_LIVE_ORDERS: ${EXECUTOR_ENABLE_LIVE_ORDERS:-false}
      EXECUTOR_PAPER_MAX_OPEN_POSITIONS: ${EXECUTOR_PAPER_MAX_OPEN_POSITIONS:-4}
      EXECUTOR_LIVE_SYMBOL_ALLOWLIST: ${EXECUTOR_LIVE_SYMBOL_ALLOWLIST:-DOGEUSDT}
      TRADING_PAIRS: ${TRADING_PAIRS:-DOGEUSDT,XRPUSDT,ADAUSDT,XLMUSDT}
      REDIS_URL: redis://localhost:6379
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_executor=info,tupa=warn"
    volumes:
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      strategy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  monitor:
    build:
      context: ..
      dockerfile: services/monitor/Dockerfile
      args:
        RUST_VERSION: "1.83"
        RUST_BUILDER_IMAGE: ${RUST_BUILDER_IMAGE:-vipertrade-base-rust-builder:1.83}
        RUST_RUNTIME_IMAGE: ${RUST_RUNTIME_IMAGE:-vipertrade-base-rust-runtime:bookworm}
    container_name: vipertrade-monitor
    network_mode: host
    environment:
      TRADING_MODE: ${TRADING_MODE:-paper}
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
      BYBIT_TESTNET_API_SECRET: ${BYBIT_TESTNET_API_SECRET:-}
      BYBIT_MAINNET_API_KEY: ${BYBIT_MAINNET_API_KEY:-}
      BYBIT_MAINNET_API_SECRET: ${BYBIT_MAINNET_API_SECRET:-}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_RECV_WINDOW: ${BYBIT_RECV_WINDOW:-5000}
      DISCORD_WEBHOOK_CRITICAL: ${DISCORD_WEBHOOK_CRITICAL}
      DISCORD_WEBHOOK_WARNING: ${DISCORD_WEBHOOK_WARNING}
      DISCORD_WEBHOOK_INFO: ${DISCORD_WEBHOOK_INFO}
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      HEALTH_CHECK_INTERVAL_MIN: ${HEALTH_CHECK_INTERVAL_MIN:-15}
      RECONCILIATION_INTERVAL_MIN: ${RECONCILIATION_INTERVAL_MIN:-5}
      ALERT_COOLDOWN_SEC: ${ALERT_COOLDOWN_SEC:-300}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_monitor=info,tupa=warn"
    volumes:
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  backtest:
    build:
      context: ..
      dockerfile: services/backtest/Dockerfile
      args:
        RUST_VERSION: "1.83"
        RUST_BUILDER_IMAGE: ${RUST_BUILDER_IMAGE:-vipertrade-base-rust-builder:1.83}
        RUST_RUNTIME_IMAGE: ${RUST_RUNTIME_IMAGE:-vipertrade-base-rust-runtime:bookworm}
    container_name: vipertrade-backtest
    network_mode: host
    environment:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-vipertrade}
      DB_USER: ${POSTGRES_USER:-viper}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ../config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ═══════════════════════════════════════════════════════════
  # WEB & API SERVICES
  # ═══════════════════════════════════════════════════════════
  web:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        NODE_VERSION: "20"
        WEB_BASE_IMAGE: ${WEB_BASE_IMAGE:-vipertrade-base-web-node:20-bookworm}
    container_name: vipertrade-web
    network_mode: host
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
      DATABASE_URL: postgresql://${POSTGRES_USER:-viper}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB:-vipertrade}
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev_only_change_me}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    command: sh -lc "rm -rf .next && npm install && npm run dev"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ../web:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
      args:
        RUST_VERSION: "1.83"
        RUST_BUILDER_IMAGE: ${RUST_BUILDER_IMAGE:-vipertrade-base-rust-builder:1.83}
        RUST_RUNTIME_IMAGE: ${RUST_RUNTIME_IMAGE:-vipertrade-base-rust-runtime:bookworm}
    container_name: vipertrade-api
    network_mode: host
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-viper}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB:-vipertrade}
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ${JWT_SECRET:-generate_me}
      TRADING_MODE: ${TRADING_MODE:-paper}
      STRATEGY_CONFIG: /app/config/pairs.yaml
      BYBIT_ENV: ${BYBIT_ENV:-testnet}
      BYBIT_TESTNET_API_KEY: ${BYBIT_TESTNET_API_KEY:-}
      BYBIT_TESTNET_API_SECRET: ${BYBIT_TESTNET_API_SECRET:-}
      BYBIT_MAINNET_API_KEY: ${BYBIT_MAINNET_API_KEY:-}
      BYBIT_MAINNET_API_SECRET: ${BYBIT_MAINNET_API_SECRET:-}
      BYBIT_API_KEY: ${BYBIT_API_KEY}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET}
      BYBIT_RECV_WINDOW: ${BYBIT_RECV_WINDOW:-5000}
      BYBIT_ACCOUNT_TYPE: ${BYBIT_ACCOUNT_TYPE:-UNIFIED}
      TRADING_PROFILE: ${TRADING_PROFILE:-MEDIUM}
      OPERATOR_API_TOKEN: ${OPERATOR_API_TOKEN}
      OPERATOR_AUTH_MODE: ${OPERATOR_AUTH_MODE:-token}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUST_LOG: "vipertrade_api=info"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ../config/trading/pairs.yaml:/app/config/pairs.yaml:ro
      - ../logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    stop_signal: SIGINT
    stop_grace_period: 45s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

# ═══════════════════════════════════════════════════════════
# VOLUMES
# ═══════════════════════════════════════════════════════════
volumes:
  postgres_data:
  redis_data:
  tupa-cache:

# NetworkPolicies for the vipertrade namespace.
#
# Scope: protect the datastores only. postgres and redis each get a policy that
# admits just their real consumers; every other pod that connects to them is
# denied (a pod selected by an ingress policy defaults to deny for unlisted
# sources). All app<->app HTTP is intentionally left unrestricted.
#
# Why not a namespace-wide default-deny + per-service allows: this cluster's
# kindnet (kindest/kindnetd:v20240813+) enforces NetworkPolicy, and getting every
# app->app edge exactly right proved fragile — a missing/!mismatched allow shows
# up as a silently dropped SYN (request hangs to timeout), which broke web's
# startup and the console's server-side calls (web -> api/ai-analyst). The high
# value is keeping a compromised pod off the DB/Redis; the per-HTTP-service rules
# added cost without much benefit on a local paper-trading cluster, so they were
# removed. Re-introduce a default-deny + full allow set only against a CNI/policy
# matrix you've validated end-to-end.
#
# Egress is unrestricted (these are Ingress policies), so services keep reaching
# the Bybit API and cluster DNS. Kubelet probes are node-sourced; kindnet permits
# host->pod, so liveness/readiness are unaffected.
---
# postgres: only the DB consumers. market-data is intentionally excluded (it uses
# redis only), and so is web (it talks to api, not the DB).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres
  namespace: vipertrade
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [analytics, strategy, executor, monitor, api, ai-analyst]
      ports:
        - protocol: TCP
          port: 5432
---
# redis: only the redis consumers.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis
  namespace: vipertrade
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app
                operator: In
                values: [market-data, strategy, executor, api]
      ports:
        - protocol: TCP
          port: 6379

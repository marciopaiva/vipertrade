apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: strategy
  template:
    metadata:
      labels:
        app: strategy
    spec:
      containers:
      - name: strategy
        image: localhost:5001/vipertrade:dev
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: vipertrade-config
        - secretRef:
            name: vipertrade-secrets
        ports:
        - containerPort: 8082
        resources:
          requests:
            memory: 512Mi
            cpu: 1000m
          limits:
            memory: 512Mi
            cpu: 1000m
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          # TCP, not /health: /health returns 503 on transient DB blips, which
          # must take the pod OUT OF ROTATION (readiness) — not RESTART it.
          tcpSocket:
            port: 8082
          initialDelaySeconds: 45
          periodSeconds: 20
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: tupa-cache
          mountPath: /home/viper/.cache/tupa
        command:
        - wait-for-deps.sh
        - postgres:5432
        - redis:6379
        - market-data:8081
        - --
        - viper
        env:
        - name: VIPER_ROLE
          value: strategy
      volumes:
      - name: logs
        emptyDir: {}
      - name: tupa-cache
        emptyDir: {}
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: strategy
  template:
    metadata:
      labels:
        app: strategy
    spec:
      containers:
        - name: strategy
          image: localhost:5001/vipertrade-strategy:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: vipertrade-config
            - secretRef:
                name: vipertrade-secrets
          ports:
            - containerPort: 8082
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 45
            periodSeconds: 20
          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: tupa-cache
              mountPath: /home/viper/.cache/tupa
      volumes:
        - name: logs
          emptyDir: {}
        - name: tupa-cache
          emptyDir: {}
---

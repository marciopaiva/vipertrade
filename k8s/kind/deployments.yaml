apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-analyst
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-analyst
  template:
    metadata:
      labels:
        app: ai-analyst
    spec:
      containers:
      - name: ai-analyst
        image: localhost:5001/vipertrade:dev
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: vipertrade-config
        - secretRef:
            name: vipertrade-secrets
        ports:
        - containerPort: 8087
        resources:
          # Larger than the other services: /sweep loads up to 60k audit rows
          # (input_data jsonb) into memory for the deterministic backtest; 256Mi
          # OOM-kills it past ~20k rows.
          requests:
            memory: 512Mi
            cpu: 500m
          limits:
            memory: 1Gi
            cpu: 500m
        readinessProbe:
          httpGet:
            path: /health
            port: 8087
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          # TCP, not /health: /health returns 503 when the DB check fails, which
          # must take the pod OUT OF ROTATION (readiness) — not RESTART it.
          tcpSocket:
            port: 8087
          initialDelaySeconds: 30
          periodSeconds: 20
        command:
        - wait-for-deps.sh
        - postgres:5432
        - --
        - viper
        env:
        - name: VIPER_ROLE
          value: ai-analyst
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: localhost:5001/vipertrade-web:dev
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: vipertrade-config
        - secretRef:
            name: vipertrade-secrets
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: 512Mi
            cpu: 1000m
          limits:
            memory: 512Mi
            cpu: 1000m
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          # TCP, not HTTP: only restart the pod when the process is actually
          # dead, not on transient HTTP blips from a backend dependency.
          tcpSocket:
            port: 3000
          initialDelaySeconds: 45
          periodSeconds: 20
        # Wait only for api (web's sole backend dependency). The baked image CMD
        # also waits for postgres/redis/ai-analyst, which web never talks to
        # directly and the NetworkPolicy correctly denies — waiting on them
        # hangs startup once policies are enforced (kindnet v20240813+).
        command:
        - wait-for-deps.sh
        - api:8080
        - --
        - node
        - server.js

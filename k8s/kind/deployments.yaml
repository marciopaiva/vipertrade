apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: market-data
  template:
    metadata:
      labels:
        app: market-data
    spec:
      containers:
      - name: market-data
        image: localhost:5001/vipertrade:dev
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: vipertrade-config
        - secretRef:
            name: vipertrade-secrets
        ports:
        - containerPort: 8081
        resources:
          requests:
            memory: 256Mi
            cpu: 500m
          limits:
            memory: 256Mi
            cpu: 500m
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          # TCP, not /health: /health returns 503 on transient DB blips, which
          # must take the pod OUT OF ROTATION (readiness) — not RESTART it.
          tcpSocket:
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 20
        command:
        - wait-for-deps.sh
        - redis:6379
        - --
        - viper
        env:
        - name: VIPER_ROLE
          value: market-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
      - name: analytics
        image: localhost:5001/vipertrade:dev
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: vipertrade-config
        - secretRef:
            name: vipertrade-secrets
        ports:
        - containerPort: 8086
        resources:
          requests:
            memory: 256Mi
            cpu: 500m
          limits:
            memory: 256Mi
            cpu: 500m
        readinessProbe:
          httpGet:
            path: /health
            port: 8086
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          # TCP, not /health: /health returns 503 when the DB check fails, which
          # must take the pod OUT OF ROTATION (readiness) — not RESTART it. Under
          # load the SELECT 1 can blip, which on liveness causes a crash loop.
          tcpSocket:
            port: 8086
          initialDelaySeconds: 30
          periodSeconds: 20
        command:
        - wait-for-deps.sh
        - postgres:5432
        - --
        - viper
        env:
        - name: VIPER_ROLE
          value: analytics

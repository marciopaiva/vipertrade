apiVersion: v1
kind: ConfigMap
metadata:
  name: vipertrade-config
data:
  # Trading configuration
  TRADING_MODE: paper
  BYBIT_ENV: testnet
  BYBIT_RECV_WINDOW: "5000"
  BYBIT_ACCOUNT_TYPE: UNIFIED

  # Database configuration
  POSTGRES_DB: vipertrade
  POSTGRES_USER: viper
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: vipertrade
  DB_USER: viper

  # Redis configuration
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_URL: redis://redis:6379

  # Strategy configuration
  STRATEGY_CONFIG: /app/config/trading/pairs.yaml
  TUPA_AUDIT_PATH: /app/logs/audit
  TUPA_SEED: "42"
  TUPA_BACKEND: hybrid
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
  LD_LIBRARY_PATH: /usr/local/lib

  # Service URLs (internal K8s DNS)
  WALLET_API_BASE_URL: http://api:8080
  ANALYTICS_SCORES_URL: http://analytics:8086/scores

  # Analytics configuration
  ANALYTICS_MIN_EVALUATED: "20"
  ANALYTICS_HORIZON_MINUTES: "5"
  ANALYTICS_LOOKBACK_HOURS: "24"
  ANALYTICS_SAMPLE_INTERVAL_SECONDS: "5"

  # Trading profile
  TRADING_PROFILE: MEDIUM

  # ai-analyst /analyze/tuning — OpenRouter model for the Format-A narration layer
  # (numbers come from the deterministic grid; the model only writes prose). Override
  # with any strong OpenRouter slug. The API KEY is a SECRET → compose/.env
  # (OPENROUTER_API_KEY), never here. With no key, /analyze/tuning returns the grid only.
  OPENROUTER_MODEL: "openai/gpt-oss-120b:free"

  # Strategy: use the real decision logic (ENTER_LONG/SHORT) instead of the
  # always-HOLD stub. Safe to enable here because TRADING_MODE=paper and
  # EXECUTOR_ENABLE_LIVE_ORDERS=false — fills are DB-simulated, no real orders.
  STRATEGY_REAL_DECISIONS: "true"

  # Executor configuration
  EXECUTOR_ENABLE_LIVE_ORDERS: "false"
  EXECUTOR_PAPER_MAX_OPEN_POSITIONS: "4"
  EXECUTOR_RECONCILE_FIX: "false"

  # System configuration
  HEALTH_CHECK_INTERVAL_MIN: "15"
  RECONCILIATION_INTERVAL_MIN: "5"
  ALERT_COOLDOWN_SEC: "300"

  # AI Analyst configuration — descriptive diagnostics + deterministic /sweep
  # backtest only (no LLM auto-tuning; tuning is manual via the backtest engine).
  AI_ANALYST_LOOKBACK_HOURS: "24"

  # Operator API configuration
  OPERATOR_AUTH_MODE: token

  # Web/API configuration
  BACKEND_API_URL: http://api:8080/api/v1
  NEXT_PUBLIC_API_URL: http://api:8080
  NEXT_PUBLIC_WS_URL: ws://api:8080/ws
  NEXTAUTH_URL: http://localhost:30080

  # Logging
  LOG_LEVEL: info
  RUST_LOG: info

# Kustomization for resource limits patch
# Applies to all deployments in vipertrade namespace

resources:
  - deployments.yaml
  - postgres.yaml
  - redis.yaml

patchesStrategicMerge:
  # Market Data
  - patches/market-data-resources.yaml
  # Analytics
  - patches/analytics-resources.yaml
  # Strategy
  - patches/strategy-resources.yaml
  # Executor
  - patches/executor-resources.yaml
  # Monitor
  - patches/monitor-resources.yaml
  # Backtest
  # API
  - patches/api-resources.yaml
  # AI Analyst
  - patches/ai-analyst-resources.yaml
  # Web
  - patches/web-resources.yaml
  # Postgres
  - patches/postgres-resources.yaml
  # Redis
  - patches/redis-resources.yaml

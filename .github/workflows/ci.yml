name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop/**

jobs:
  rust:
    name: Rust CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.83
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Validate make help
        run: make help >/dev/null

      - name: Format Check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Cargo Test
        run: cargo test --workspace --locked

      - name: Cargo Check
        run: cargo check --workspace --locked

  docs:
    name: Docs Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install markdownlint-cli
        run: npm i -g markdownlint-cli@0.41.0

      - name: Strict markdown lint
        shell: bash
        run: |
          set -euo pipefail
          targets=(README.md CONTRIBUTING.md)
          while IFS= read -r file; do
            targets+=("$file")
          done < <(find docs -type f -name '*.md' | sort)
          markdownlint "${targets[@]}"

  web:
    name: Web Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: services/web/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      - name: Build Web
        run: yarn build


  executor-db:
    name: Executor DB Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vipertrade
          POSTGRES_USER: viper
          POSTGRES_PASSWORD: viper_secret_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U viper -d vipertrade"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8
    env:
      EXECUTOR_TEST_DATABASE_URL: postgres://viper:viper_secret_password@localhost:5432/vipertrade
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.83

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Apply schema
        run: psql "$EXECUTOR_TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -f database/schema.sql

      - name: Executor tests (with DB)
        run: cargo test -p viper-executor --locked

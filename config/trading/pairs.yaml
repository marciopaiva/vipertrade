# absent. Conservative sizing within the existing per-symbol ranges.
# 2026-06-19: pruned (broaden-then-prune). Structural incompatibility with the
# trend-following entry model, NOT a PnL cut. Audit (3 days, ~6.3k decisions each):
# BTC/BNB never fired an entry (0 trades) — consensus_regime stays "neutral" because
# the EMA20/50+slope gate rarely resolves directional on low-trend majors. ETH fired

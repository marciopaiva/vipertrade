# config/trading/pairs.yaml
# ViperTrade v0.8.0-rc - Trading Pairs Configuration
# Otimizado para Smart Copy Mode com Trailing Stop Dinâmico

# ═══════════════════════════════════════════════════════════
# GLOBAL SETTINGS
# ═══════════════════════════════════════════════════════════

global:
  mode_profiles:
    PAPER:
      name: "standard_guarded"
      permissive_entry: false
      require_multi_exchange_consensus: true
      require_btc_macro_alignment: true
      prefer_bybit_for_decisions: false
      min_volume_24h_usdt: 18000000
      max_spread_pct: 0.0008
      max_atr_pct: 0.035
      max_funding_rate_pct: 0.01
      stop_loss_pct: 0.012
      fixed_take_profit_enabled: false
      trailing_enabled: true
      trailing_stop:
        activate_after_profit_pct: 0.0045
        initial_trail_pct: 0.0012
        ratchet_levels:
          - at_profit_pct: 0.006
            trail_pct: 0.001
          - at_profit_pct: 0.0075
            trail_pct: 0.0008
          - at_profit_pct: 0.009
            trail_pct: 0.0006
        move_to_break_even_at: 0.005
      min_hold_seconds: 180
      min_trend_score_long: 0.28
      min_trend_score_short: 0.28
      min_signal_confirmation_ticks_long: 3
      min_signal_confirmation_ticks_short: 5
      min_volume_ratio_long: 0.25
      min_volume_ratio_short: 0.60
      rsi_long_min: 52
      rsi_long_max: 75
      rsi_short_min: 28
      rsi_short_max: 48
      stop_loss_cooldown_minutes_long: 5
      stop_loss_cooldown_minutes_short: 8
    TESTNET:
      name: "testnet_smoke"
      permissive_entry: true
      require_multi_exchange_consensus: false
      require_btc_macro_alignment: false
      prefer_bybit_for_decisions: true
      min_volume_24h_usdt: 0
      max_spread_pct: 0.02
      max_atr_pct: 1.0
      max_funding_rate_pct: 1.0
      stop_loss_pct: 0.03
      fixed_take_profit_enabled: false
      take_profit_pct: 0.003
      trailing_enabled: true
      trailing_stop:
        activate_after_profit_pct: 0.003
        initial_trail_pct: 0.003
        ratchet_levels:
          - at_profit_pct: 0.004
            trail_pct: 0.002
          - at_profit_pct: 0.005
            trail_pct: 0.001
        move_to_break_even_at: 0.004
      min_hold_seconds: 45
      min_trend_score_long: 0.0
      min_trend_score_short: 0.0
      min_signal_confirmation_ticks_long: 1
      min_signal_confirmation_ticks_short: 1
      min_volume_ratio_long: 0.0
      min_volume_ratio_short: 0.0
      rsi_long_min: 0
      rsi_long_max: 100
      rsi_short_min: 0
      rsi_short_max: 100
      stop_loss_cooldown_minutes_long: 0
      stop_loss_cooldown_minutes_short: 0
    MAINNET:
      name: "standard_guarded"
      permissive_entry: false
      require_multi_exchange_consensus: true
      require_btc_macro_alignment: true
      prefer_bybit_for_decisions: false
      min_volume_24h_usdt: 18000000
      max_spread_pct: 0.0008
      max_atr_pct: 0.035
      max_funding_rate_pct: 0.01
      stop_loss_pct: 0.012
      fixed_take_profit_enabled: false
      trailing_enabled: true
      trailing_stop:
        activate_after_profit_pct: 0.0045
        initial_trail_pct: 0.0012
        ratchet_levels:
          - at_profit_pct: 0.006
            trail_pct: 0.001
          - at_profit_pct: 0.0075
            trail_pct: 0.0008
          - at_profit_pct: 0.009
            trail_pct: 0.0006
        move_to_break_even_at: 0.005
      min_hold_seconds: 180
      min_trend_score_long: 0.28
      min_trend_score_short: 0.28
      min_signal_confirmation_ticks_long: 3
      min_signal_confirmation_ticks_short: 5
      min_volume_ratio_long: 0.25
      min_volume_ratio_short: 0.60
      rsi_long_min: 52
      rsi_long_max: 75
      rsi_short_min: 28
      rsi_short_max: 48
      stop_loss_cooldown_minutes_long: 5
      stop_loss_cooldown_minutes_short: 8

  # Smart Copy constraints
  smart_copy:
    enabled: true
    min_position_usdt: 5      # Abaixo não copia bem
    max_position_usdt: 30     # Acima exclui followers pequenos
    target_position_usdt: 10-20  # Sweet spot
    max_position_change_pct: 0.30  # Máx 30% variação entre trades
  
  # Trailing Stop Dinâmico (global defaults)
  trailing_stop:
    enabled: true
    check_interval_ms: 500
    max_updates_per_min: 10
    min_move_threshold_pct: 0.002  # Só atualiza se mover >= 0.2%
  
  # Risk limits globais
  risk:
    max_daily_loss_pct: 0.03
    max_consecutive_losses: 3
    max_open_positions: 4
    max_total_exposure_pct: 0.50
  
  # Entry timing filters
  entry_filters:
    avoid_hours_utc: ["00:00-02:00", "22:00-23:59"]  # Rollover funding
    min_volume_24h_usdt: 30000000  # $30M mínimo
    max_spread_pct: 0.001  # 0.1% máximo
    max_atr_pct: 0.05  # 5% volatilidade máxima
    max_funding_rate_pct: 0.015  # 1.5% funding máximo
    min_trend_score: 0.25
    min_signal_confirmation_ticks: 2
    min_volume_ratio: 1.0
    min_volume_ratio_long: 0.90
    min_volume_ratio_short: 0.95
    rsi_long_min: 50
    rsi_long_max: 80
    rsi_short_min: 20
    rsi_short_max: 50
    stop_loss_cooldown_minutes: 3
    stop_loss_cooldown_minutes_short: 5
    min_signal_confirmation_ticks_short: 4

# ═══════════════════════════════════════════════════════════
# DOGEUSDT - Meme Coin (Alta Volatilidade)
# ═══════════════════════════════════════════════════════════

DOGEUSDT:
  enabled: true
  category: "meme_coin"
  volatility_profile: "high"
  mode_profiles:
    PAPER:
      risk:
        max_position_wallet_pct: 0.08
    TESTNET:
      risk:
        max_position_wallet_pct: 0.0027
    MAINNET:
      risk:
        max_position_wallet_pct: 0.08
  
  # Bybit-specific settings
  bybit:
    price_precision: 5
    qty_precision: 0
    tick_size: 0.00001
    step_size: 1
    min_order_value_usdt: 5.00
    max_order_value_usdt: 50.00
  
  # Risk parameters (mais conservador devido à volatilidade)
  risk:
    stop_loss_pct: 0.0025      # 0.25% para teste scalp
    take_profit_pct: 0.003      # 0.30% para teste scalp
    max_position_usdt: 15.00   # Máx 15% do capital
    atr_period: 14
    atr_multiplier: 0.5        # Reduz sizing em alta volatilidade
  
  # Trailing Stop Dinâmico (específico para DOGE)
  trailing_stop:
    enabled: true
    by_profile:
      CONSERVATIVE:
        activate_after_profit_pct: 0.015
        initial_trail_pct: 0.008
        ratchet_levels:
          - at_profit_pct: 0.03
            trail_pct: 0.012
          - at_profit_pct: 0.06
            trail_pct: 0.02
        move_to_break_even_at: 0.02
      MEDIUM:
        activate_after_profit_pct: 0.0025
        initial_trail_pct: 0.0015
        ratchet_levels:
          - at_profit_pct: 0.0045
            trail_pct: 0.002
          - at_profit_pct: 0.0075
            trail_pct: 0.003
        move_to_break_even_at: 0.003
      AGGRESSIVE:
        activate_after_profit_pct: 0.025
        initial_trail_pct: 0.012
        ratchet_levels:
          - at_profit_pct: 0.05
            trail_pct: 0.02
          - at_profit_pct: 0.10
            trail_pct: 0.035
        move_to_break_even_at: 0.03
  
  # Liquidity filters
  liquidity:
    min_24h_volume_usdt: 50000000  # $50M mínimo
    max_spread_pct: 0.001          # 0.1% spread máximo
    avoid_during_low_liquidity: true

  entry_filters:
    min_trend_score_long: 0.38
    min_trend_score_short: 0.35
    min_trend_score: 0.38
    min_signal_confirmation_ticks_long: 3
    min_signal_confirmation_ticks_short: 4
    min_signal_confirmation_ticks: 3
    stop_loss_cooldown_minutes_short: 5
    max_atr_pct: 0.0055
  
  # Smart Copy specific
  smart_copy:
    recommended_for_beginners: false
    warning: "High volatility - use Conservative profile"


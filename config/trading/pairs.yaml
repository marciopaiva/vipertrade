# config/trading/pairs.yaml
# ViperTrade v0.8.0-rc - Trading Pairs Configuration
# Otimizado para Smart Copy Mode com Trailing Stop Dinâmico

# ═══════════════════════════════════════════════════════════
# GLOBAL SETTINGS
# ═══════════════════════════════════════════════════════════

global:
  # Smart Copy constraints
  smart_copy:
    enabled: true
    min_position_usdt: 5      # Abaixo não copia bem
    max_position_usdt: 30     # Acima exclui followers pequenos
    target_position_usdt: 10-20  # Sweet spot
    max_position_change_pct: 0.30  # Máx 30% variação entre trades
  
  # Trailing Stop Dinâmico (global defaults)
  trailing_stop:
    enabled: true
    check_interval_ms: 500
    max_updates_per_min: 10
    min_move_threshold_pct: 0.002  # Só atualiza se mover >= 0.2%
  
  # Risk limits globais
  risk:
    max_daily_loss_pct: 0.03
    max_consecutive_losses: 3
    max_open_positions: 2
    max_total_exposure_pct: 0.50
  
  # Entry timing filters
  entry_filters:
    avoid_hours_utc: ["00:00-02:00", "22:00-23:59"]  # Rollover funding
    min_volume_24h_usdt: 30000000  # $30M mínimo
    max_spread_pct: 0.001  # 0.1% máximo
    max_atr_pct: 0.05  # 5% volatilidade máxima
    max_funding_rate_pct: 0.015  # 1.5% funding máximo

# ═══════════════════════════════════════════════════════════
# DOGEUSDT - Meme Coin (Alta Volatilidade)
# ═══════════════════════════════════════════════════════════

DOGEUSDT:
  enabled: true
  category: "meme_coin"
  volatility_profile: "high"
  
  # Bybit-specific settings
  bybit:
    price_precision: 5
    qty_precision: 0
    tick_size: 0.00001
    step_size: 1
    min_order_value_usdt: 5.00
    max_order_value_usdt: 50.00
  
  # Risk parameters (mais conservador devido à volatilidade)
  risk:
    stop_loss_pct: 0.02        # 2% (mais amplo que BTC)
    take_profit_pct: 0.04      # 4% (4:1 R/R compensa volatilidade)
    max_position_usdt: 15.00   # Máx 15% do capital
    atr_period: 14
    atr_multiplier: 0.5        # Reduz sizing em alta volatilidade
  
  # Trailing Stop Dinâmico (específico para DOGE)
  trailing_stop:
    enabled: true
    by_profile:
      CONSERVATIVE:
        activate_after_profit_pct: 0.015
        initial_trail_pct: 0.008
        ratchet_levels:
          - at_profit_pct: 0.03
            trail_pct: 0.012
          - at_profit_pct: 0.06
            trail_pct: 0.02
        move_to_break_even_at: 0.02
      MEDIUM:
        activate_after_profit_pct: 0.02
        initial_trail_pct: 0.01
        ratchet_levels:
          - at_profit_pct: 0.04
            trail_pct: 0.015
          - at_profit_pct: 0.08
            trail_pct: 0.025
        move_to_break_even_at: 0.025
      AGGRESSIVE:
        activate_after_profit_pct: 0.025
        initial_trail_pct: 0.012
        ratchet_levels:
          - at_profit_pct: 0.05
            trail_pct: 0.02
          - at_profit_pct: 0.10
            trail_pct: 0.035
        move_to_break_even_at: 0.03
  
  # Liquidity filters
  liquidity:
    min_24h_volume_usdt: 50000000  # $50M mínimo
    max_spread_pct: 0.001          # 0.1% spread máximo
    avoid_during_low_liquidity: true
  
  # Smart Copy specific
  smart_copy:
    recommended_for_beginners: false
    warning: "High volatility - use Conservative profile"


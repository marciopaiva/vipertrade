# ═══════════════════════════════════════════════════════════
# RISK PROFILES (Overrides globais por perfil)
# ═══════════════════════════════════════════════════════════

profiles:
  CONSERVATIVE:
    risk_per_trade_pct: 0.75
    max_leverage: 2
    max_daily_loss_pct: 0.02
    max_open_positions: 1
    max_total_exposure_pct: 0.30
    trailing_stop_aggressiveness: "high"  # Aperta rápido
    position_sizing_multiplier: 0.6       # Reduz sizing base
  
  MEDIUM:
    risk_per_trade_pct: 1.25
    max_leverage: 2
    max_daily_loss_pct: 0.03
    max_open_positions: 2
    max_total_exposure_pct: 0.50
    trailing_stop_aggressiveness: "medium"
    position_sizing_multiplier: 1.0
  
  AGGRESSIVE:
    risk_per_trade_pct: 2.00
    max_leverage: 3
    max_daily_loss_pct: 0.05
    max_open_positions: 3
    max_total_exposure_pct: 0.70
    trailing_stop_aggressiveness: "low"   # Dá mais espaço
    position_sizing_multiplier: 1.4       # Aumenta sizing base
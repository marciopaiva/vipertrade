# config/trading/pairs.yaml
# ViperTrade v0.8.1 - Trading Pairs Configuration
# Otimizado para Smart Copy Mode com Trailing Stop Dinâmico

# ═══════════════════════════════════════════════════════════
# GLOBAL SETTINGS
# ═══════════════════════════════════════════════════════════

global:
  mode_profiles:
    # ═══════════════════════════════════════════════════════════
    # PAPER MODE - OTIMIZADO (2026-04-01)
    # Mudanças: thesis invalidation menos sensível, filtros mais rigorosos
    # ═══════════════════════════════════════════════════════════
    PAPER: &paper_profile
      name: "standard_guarded_v2"
      permissive_entry: false
      require_multi_exchange_consensus: true
      require_btc_macro_alignment: true
      min_volume_24h_usdt: 16000000
      max_spread_pct: 0.0008
      max_atr_pct: 0.035
      max_funding_rate_pct: 0.01
      stop_loss_pct: 0.012
      fixed_take_profit_enabled: false
      trailing_enabled: true
      trailing_stop:
        # Tuned via backtest (large corpus): activate sooner + tighter initial
        # trail captures more of the trailing edge. net -0.3034 -> -0.2310.
        activate_after_profit_pct: 0.0015
        initial_trail_pct: 0.0006
        # Ratchets must only tighten (<= initial_trail_pct) as profit grows.
        ratchet_levels:
          - at_profit_pct: 0.003
            trail_pct: 0.0005
          - at_profit_pct: 0.0045
            trail_pct: 0.0004
          - at_profit_pct: 0.006
            trail_pct: 0.0003
        move_to_break_even_at: 0.0016
      # Aumentado de 180 para 300 segundos - evita saídas prematuras
      min_hold_seconds: 300
      # Aumentado para filtrar entradas marginais - CORRIGIDO 2026-04-02
      min_trend_score_long: 0.50
      # Raised 0.45 -> 0.55 in the 2026-06-13 entry-filter retune (deterministic
      # backtest, 60k+20k windows): part of the combo that ~4x'd net PnL and
      # halved the stop_loss bleed.
      min_trend_score_short: 0.55
      # Reduzida assimetria Long/Short
      min_signal_confirmation_ticks_long: 4
      min_signal_confirmation_ticks_short: 5
      # BTC Macro mais rigoroso
      btc_macro_min_trend_score_long: 0.15
      btc_macro_min_trend_score_short: 0.20
      btc_macro_min_consensus_count_long: 2
      btc_macro_min_consensus_count_short: 3
      btc_macro_neutral_penalty: 0.05
      min_volume_ratio_long: 0.25
      min_volume_ratio_short: 0.25
      rsi_long_min: 52
      rsi_long_max: 75
      rsi_short_min: 28
      rsi_short_max: 48
      # Bollinger %B entry guard: skip longs at band tops / shorts at band
      # bottoms. Backtest (#37): net -0.3488 -> +0.0030, thesis bleed 37 -> 17.
      max_percent_b_long: 0.85
      # Raised 0.15 -> 0.20 in the 2026-06-13 entry-filter retune (see min_adx).
      min_percent_b_short: 0.20
      # ADX(14) entry gate: skip entries in chop (weak trend). Gain plateaus 18-22;
      # >=25 over-cuts. Set to 20 in the 2026-06-13 retune on the 4x-grown corpus
      # (60k+20k windows): min_adx alone +1.55 net; the AI auto-tuner had drifted
      # this to 25 (over-cutting profitable trades) before the retune reverted it.
      # Read as a DIRECT child of the mode profile by mode_f64("min_adx").
      min_adx: 20
      stop_loss_cooldown_minutes_long: 5
      stop_loss_cooldown_minutes_short: 8
      # Position-sizing DEFAULTS (single source of truth). Every token inherits
      # these unless it sets a per-symbol risk override — so a freshly-added token
      # (just `enabled: true`) is sized conservatively, never on the raw global cap.
      # Read by max_position_wallet_pct / atr_multiplier / max_position_usdt as the
      # fallback after any per-symbol value.
      risk:
        max_position_wallet_pct: 0.08   # cap = 8% of equity
        atr_multiplier: 0.65            # volatility sizing dampener (applied to live ATR)
        max_position_usdt: 18           # also bounded by smart_copy.max_position_usdt (30)
      # Thesis health-score invalidation DISABLED (analysis 2026-06-11). The
      # health-score exit tiers were micro-cutting winners that would have
      # trailed to profit. Deterministic backtest (ADX-era corpus, 91 trades):
      # pushing every tier past the [-100,100] health clamp lifts net
      # -0.5950 -> -0.0263 (+0.57), win 47.3% -> 70.8%; thesis closes 61 -> 15
      # (opposite_side regime-flip only), trailing 25 -> 67, stop_loss 5 -> 7.
      # Per-trade trailing edge unchanged (+0.024) so it is migration, not luck.
      # PARTIAL tuning backfires (tier interaction → degrading-path cascade), so
      # this is all-or-nothing. opposite_side (consensus flip) + stop_loss +
      # trailing remain the exit set. Read as DIRECT children of this mode
      # profile by StrategyConfig::thesis_health(); values past ±100 never fire.
      thesis_health:
        long_invalidate: -200
        long_invalidate_confirmed: -200
        long_no_alignment: -200
        long_degrading_hard: -200
        long_degrading_hard_unaligned: -200
        long_degrading_soft: -200
        long_degrading_soft_unaligned: -200
        short_invalidate: 200
        short_no_alignment: 200
        short_degrading_hard: 200
        short_degrading_hard_unaligned: 200
        short_degrading_soft: 200
        short_degrading_soft_unaligned: 200
        # Regime-flip exit: require BOTH consensus_side AND bybit_regime to flip
        # against the position before cutting (the old "any"/OR cut on a single
        # noisy bybit_regime blip). Backtest (ADX-era corpus, 3 windows): net
        # Δ +0.11..+0.19, win rate up in all, stop_loss unchanged — fewer false
        # cuts migrate to trailing without losing the protective value. "off"
        # was worse (losers ride to stop_loss: 7 -> 16). evaluate_thesis_invalidation.
        opposite_side_exit: both
      entry_filters:
        # Aumentado de 2 para 4 - requer mais confirmação antes de invalidar
        thesis_invalidation_confirmation_ticks: 4
        # Aumentado cooldown para evitar reentrada imediata após perda
        thesis_invalidation_cooldown_minutes_long: 8
        thesis_invalidation_cooldown_minutes_short: 10
    TESTNET:
      name: "testnet_smoke"
      permissive_entry: true
      require_multi_exchange_consensus: false
      require_btc_macro_alignment: false
      min_volume_24h_usdt: 0
      max_spread_pct: 0.02
      max_atr_pct: 1.0
      max_funding_rate_pct: 1.0
      stop_loss_pct: 0.03
      fixed_take_profit_enabled: false
      take_profit_pct: 0.003
      trailing_enabled: true
      trailing_stop:
        activate_after_profit_pct: 0.003
        initial_trail_pct: 0.003
        ratchet_levels:
          - at_profit_pct: 0.004
            trail_pct: 0.002
          - at_profit_pct: 0.005
            trail_pct: 0.001
        move_to_break_even_at: 0.004
      min_hold_seconds: 45
      min_trend_score_long: 0.0
      min_trend_score_short: 0.0
      min_signal_confirmation_ticks_long: 1
      min_signal_confirmation_ticks_short: 1
      min_volume_ratio_long: 0.0
      min_volume_ratio_short: 0.0
      rsi_long_min: 0
      rsi_long_max: 100
      rsi_short_min: 0
      rsi_short_max: 100
      stop_loss_cooldown_minutes_long: 0
      stop_loss_cooldown_minutes_short: 0
    # ═══════════════════════════════════════════════════════════
    # MAINNET MODE — kept identical to PAPER via YAML anchor.
    # Tune PAPER (&paper_profile); MAINNET inherits it. Don't duplicate keys
    # here or the two profiles would diverge.
    # ═══════════════════════════════════════════════════════════
    MAINNET: *paper_profile

  # Smart Copy constraints
  smart_copy:
    enabled: true
    min_position_usdt: 5      # Abaixo não copia bem
    max_position_usdt: 30     # Acima exclui followers pequenos
  
  # Trailing Stop Dinâmico (global defaults)
  trailing_stop:
    enabled: true
  
  # Risk limits globais
  risk:
    max_daily_loss_pct: 0.03
    max_consecutive_losses: 3
  
  # Entry timing filters - OTIMIZADO (2026-04-01)
  entry_filters:
    min_volume_24h_usdt: 30000000  # $30M mínimo
    max_spread_pct: 0.001  # 0.1% máximo
    max_atr_pct: 0.05  # 5% volatilidade máxima
    max_funding_rate_pct: 0.015  # 1.5% funding máximo
    # Aumentado de 0.25 para filtrar melhor
    min_trend_score: 0.35
    # Aumentado de 2 para 4
    min_signal_confirmation_ticks: 4
    min_volume_ratio: 1.0
    min_volume_ratio_long: 0.90
    min_volume_ratio_short: 0.95
    rsi_long_min: 50
    rsi_long_max: 80
    rsi_short_min: 20
    rsi_short_max: 50
    # BTC Macro mais rigoroso
    btc_macro_min_trend_score_long: 0.15
    btc_macro_min_trend_score_short: 0.20
    btc_macro_min_consensus_count_long: 2
    btc_macro_min_consensus_count_short: 3
    btc_macro_neutral_penalty: 0.05
    # Aumentado cooldown
    stop_loss_cooldown_minutes: 5
    stop_loss_cooldown_minutes_short: 8
    min_signal_confirmation_ticks_short: 5

# ═══════════════════════════════════════════════════════════
# PER-SYMBOL OVERRIDES
# Only the keys actually honored per symbol: `enabled` (the universe marker
# read by market-data + web) and position SIZING. All signal/entry/exit tuning
# lives in global.mode_profiles.PAPER (the single source of truth tuned via the
# backtest) — per-symbol signal overrides were dropped (they silently shadowed
# the global tunables). max_position_wallet_pct is read per mode; max_position_usdt
# (capped at smart_copy.max_position_usdt) + atr_multiplier are pair-level.
# ═══════════════════════════════════════════════════════════

